name: Scrape AI News

on:
  schedule:
    # 每 2 小时运行一次
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests supabase openai python-dotenv feedparser beautifulsoup4

      - name: Run arXiv scraper
        run: python scripts/scraper_arxiv.py
        continue-on-error: true

      - name: Run TechCrunch business scraper
        run: python scripts/scraper_business.py
        continue-on-error: true

      - name: Run GitHub products scraper
        run: python scripts/scraper_products.py
        continue-on-error: true

